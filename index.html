<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoCAD Web — Untitled1.dwg</title>
 
<!-- Three.js Libraries for 3D Rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
 
<!-- CSS File Link -->
<link rel="stylesheet" href="/src/engines/style.css">
</head>
<body>
 
<div class="titlebar">AutoCAD Web — Untitled1.dwg</div>
<div class="menubar" id="menubar"></div>
<div class="qat-row" id="qat-row"></div>
<div class="ribbon-tabs" id="ribbon-tabs"></div>
<div class="ribbon" id="ribbon"></div>
 
<div class="main-area">
  <button id="btn-3d-toggle">👁️ Switch to 3D View</button>
 
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="cad-canvas"></canvas>
    <div class="dyn-input" id="dyn-input" style="display:none;"></div>
    <div class="tool-hint" id="tool-hint">Select objects</div>
    <div class="coords-readout" id="coords-readout">X: 0.00  Y: 0.00</div>
  </div>
 
  <div id="canvas-3d-wrap"></div>
 
  <div class="side-panel">
    <div class="side-tabs">
      <div class="side-tab active" data-tab="layers">Layers</div>
      <div class="side-tab" data-tab="props">Properties</div>
    </div>
    <div class="side-content" id="side-content"></div>
  </div>
</div>
 
<div class="command-panel">
  <div class="command-history" id="command-history"></div>
  <div class="command-input-row">
    <span class="prompt">Command:</span>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" placeholder="type a command (line, rect, circle, copy, rotate, trim, undo, zoom) and press Enter">
  </div>
</div>
 
<div class="statusbar" id="statusbar"></div>
<input type="file" id="file-import-input" accept="application/json,.json" style="display:none">
 
<!-- Modular JavaScript Entry Point -->
<script type="module" src="/src/engines/main.js"></script>
</body>
</html>
